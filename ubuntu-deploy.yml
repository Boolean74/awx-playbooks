---
- name: Vast.ai Tarzi Otomatik Dagitim
  hosts: all
  become: yes

  tasks:
    - name: Mevcut en yuksek portu bul
      shell: "docker ps --format '{% raw %}{{.Ports}}{% endraw %}' | grep -oP '0.0.0.0:\\K\\d+' | sort -n | tail -1"
      register: son_port
      failed_when: false

    - name: Yeni portu hesapla
      set_fact:
        yeni_port: "{{ (son_port.stdout | default('20000') | int) + 1 }}"

    # SEÇENEK 1: LIGHT (Sadece SSH)
    - name: Light Paket Kuruluyor
      community.docker.docker_container:
        name: "{{ kullanici_adi }}_light"
        image: rastasheep/ubuntu-sshd:latest
        state: started
        restart_policy: always
        published_ports:
          - "{{ yeni_port }}:22"
      when: paket_tipi == "light"

    # SEÇENEK 2: FULL (Kasm Desktop)
    - name: Full Paket Kuruluyor
      community.docker.docker_container:
        name: "{{ kullanici_adi }}_full"
        image: kasmweb/ubuntu-jammy-desktop:1.15.0
        state: started
        restart_policy: always
        shm_size: "512m"
        env:
          VNC_PW: "password123"
        published_ports:
          - "{{ yeni_port }}:6901"
      when: paket_tipi == "full"

    - name: Bilgi Ver
      debug:
        msg: 
          - "------------------------------------------"
          - "SİPARİŞİNİZ HAZIR!"
          - "Makine Adı: {{ kullanici_adi }}"
          - "Paket Tipi: {{ paket_tipi }}"
          - "Erişim Adresi: {{ 'https://152.70.29.70:' + yeni_port if paket_tipi == 'full' else 'ssh root@152.70.29.70 -p ' + yeni_port }}"
          - "Şifre: password123"
          - "------------------------------------------"
