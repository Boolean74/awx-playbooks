---
- name: Kasm Desktop Ubuntu Dağıtımı
  hosts: all
  become: yes

  tasks:
    - name: Mevcut en yuksek portu bul
      shell: "docker ps --format '{% raw %}{{.Ports}}{% endraw %}' | grep -oP '0.0.0.0:\\K\\d+' | sort -n | tail -1"
      register: son_port
      failed_when: false

    - name: Yeni portu hesapla
      set_fact:
        yeni_port: "{{ (son_port.stdout | default('20000') | int) + 1 }}"

    - name: Kasm Ubuntu Desktop Baslat
      community.docker.docker_container:
        name: "{{ kullanici_adi }}_kasm"
        image: kasmweb/ubuntu-jammy-desktop:1.15.0
        state: started
        restart_policy: always
        shm_size: "512m"
        # BURASI KRİTİK: Şifreyi ve kullanıcıyı burada netleştiriyoruz
        env:
          VNC_PW: "password123" 
        published_ports:
          - "{{ yeni_port }}:6901"

    - name: Bilgi ver
      debug:
        msg: "Kasm Hazir! Kullanici: kasm_user | Sifre: password123 | Port: {{ yeni_port }}"
