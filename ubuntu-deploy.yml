---
- name: Vast.ai Tarzi Otomatik Dagitim
  hosts: all
  become: yes

  tasks:
    - name: Port belirle
      shell: "docker ps --format '{% raw %}{{.Ports}}{% endraw %}' | grep -oP '0.0.0.0:\\K\\d+' | sort -n | tail -1"
      register: son_port
      failed_when: false

    - name: Yeni portu hesapla
      set_fact:
        yeni_port: "{{ (son_port.stdout | default('20000') | int) + 1 }}"

    # DURUM 1: LIGHT PAKET (Sadece SSH)
    - name: Light Paket Kuruluyor
      community.docker.docker_container:
        name: "{{ kullanici_adi }}_light"
        image: rastasheep/ubuntu-sshd:latest
        state: started
        published_ports:
          - "{{ yeni_port }}:22"
      when: paket_tipi == "light"

    # DURUM 2: FULL PAKET (Kasm Desktop)
    - name: Full Paket Kuruluyor
      community.docker.docker_container:
        name: "{{ kullanici_adi }}_full"
        image: kasmweb/ubuntu-jammy-desktop:1.15.0
        state: started
        shm_size: "512m"
        env:
          VNC_PW: "password123"
        published_ports:
          - "{{ yeni_port }}:6901"
      when: paket_tipi == "full"

    - name: Kullaniciya Bilgileri Goster
      debug:
        msg: 
          - "Siparisiniz Hazir!"
          - "Paket: {{ paket_tipi }}"
          - "IP: 152.70.29.70"
          - "Port: {{ yeni_port }}"
          - "Erisim: {{ 'https://' if paket_tipi == 'full' else 'ssh root@' }}152.70.29.70:{{ yeni_port }}"
