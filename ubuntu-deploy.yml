---
- name: Otomatik Port Atamalı Ubuntu Konteyner
  hosts: all
  become: yes

  tasks:
    - name: Calisan konteynerlerin portlarini kontrol et
      shell: "docker ps --format '{% raw %}{{.Ports}}{% endraw %}' | grep -oP '0.0.0.0:\\K\\d+' | sort -n | tail -1"
      register: son_port
      failed_when: false

    - name: Yeni portu belirle
      set_fact:
        yeni_port: "{{ (son_port.stdout | default('2220') | int) + 1 }}"

    - name: Konteyneri yeni port ile baslat
      community.docker.docker_container:
        name: "{{ kullanici_adi }}_ubuntu"
        image: rastasheep/ubuntu-sshd:latest
        state: started
        restart_policy: always
        published_ports:
          - "{{ yeni_port }}:22"

    - name: Bilgi ver
      debug:
        msg: "Konteyner {{ yeni_port }} portunda acildi!"
